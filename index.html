<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>
    <style>
        :root {
            --bg-color: #fcf6f5;       /* Soft, premium off-white */
            --card-bg: #ffffff;        /* Pure white card */
            --accent-pink: #f3b0b0;    /* Muted, elegant Rose Gold Pink */
            --accent-pink-hover: #e89c9c;
            --text-main: #2c2c2c;      /* Deep charcoal instead of harsh black */
            --text-muted: #757575;
            --input-border: #e0e0e0;
            --input-focus: #d1a3a3;
        }

        body {
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        .registration-container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.04), 0px 1px 3px rgba(0, 0, 0, 0.02);
            width: 380px;
            box-sizing: border-box;
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        h2 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 24px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--text-main);
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--input-border);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
            background-color: #fafafa;
            color: var(--text-main);
            transition: all 0.2s ease-in-out;
        }

        /* Smooth border highlight and shadow on click */
        input:focus {
            outline: none;
            border-color: var(--input-focus);
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(243, 176, 176, 0.25);
        }

        input::placeholder {
            color: #b0b0b0;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-pink);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0px 4px 12px rgba(243, 176, 176, 0.3);
            transition: all 0.2s ease;
            margin-top: 10px;
        }

        button:hover {
            background-color: var(--accent-pink-hover);
            transform: translateY(-1px);
            box-shadow: 0px 6px 16px rgba(243, 176, 176, 0.4);
        }

        button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="registration-container">
        <h2>Register Student</h2>
        <div class="subtitle">Enter your details to create an account</div>
        
        <form action="submit.php" method="POST">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Alex Johnson" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="alex@example.com" required>
            </div>
            
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="text" id="phone" name="phone" placeholder="+91 98765 43210" required>
            </div>
            
            <div class="form-group">
                <label for="place">Place</label>
                <input type="text" id="place" name="place" placeholder="Pune" required>
            </div>
            
            <button type="submit">Submit Registration</button>
        </form>
    </div>
</body>
</html>
